<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Your Hype Tunes Delivery</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/images/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" sizes="180x180">
  <meta name="theme-color" content="#3dd8ff">
  <link rel="stylesheet" href="/css/global.css">

  <style>
    body{background:#000;color:#fff;overflow-x:hidden}
    .shell{min-height:100svh;display:grid;place-items:center;padding:24px}
    .card{width:min(900px,94vw)}
    .tracks{display:grid;gap:18px;margin-top:12px}
    .track{padding:14px;border:1px solid rgba(61,216,255,.25);border-radius:12px;background:rgba(0,0,0,.35)}
    .t-head{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .t-title{font-weight:800;letter-spacing:.3px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .note{color:#7de8ff;margin-top:6px}
    audio{width:100%; margin-top:10px}
  </style>
</head>

<body>
  <canvas id="energy"></canvas><div class="overlay"></div>

  <main class="shell">
    <section class="card">
      <h1 class="neon">🎵 Your songs are ready</h1>
      <p class="note">Preview each in MP3, download the full-quality WAV.</p>

      <div id="tracks" class="tracks"></div>

      <div class="actions" style="margin-top:18px">
        <a class="chip" href="/" aria-label="Back to home">Back to Hype Tunes</a>
      </div>
    </section>
  </main>

  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabase = supabase.createClient(
      "YOUR_PROJECT_URL",
      "YOUR_ANON_KEY"
    );

    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get("order");

    async function loadOrder() {
      const { data: order, error } = await supabase
        .from("orders")
        .select("*")
        .eq("delivery_slug", slug)
        .single();

      if (error || !order) {
        document.querySelector(".card").innerHTML = "<h2>Order not found</h2>";
        return;
      }

      const tracksContainer = document.getElementById("tracks");

      // order.tracks is an array stored in your DB
      for (let i = 0; i < order.tracks.length; i++) {
        const t = order.tracks[i];

        // Generate signed URLs
        const preview = await supabase
          .storage
          .from("songs")
          .createSignedUrl(t.preview_path, 3600);

        const full = await supabase
          .storage
          .from("songs")
          .createSignedUrl(t.full_path, 3600);

        // Build track block
        const block = document.createElement("div");
        block.className = "track";
        block.innerHTML = `
          <div class="t-head">
            <div class="t-title">Track ${i+1} — <span>${t.title}</span></div>
          </div>

          <audio controls preload="none">
            <source src="${preview.data.signedUrl}" type="audio/mpeg">
          </audio>

          <div class="actions">
            <a class="btn pill" href="${full.data.signedUrl}" download>Download Master (.wav)</a>
          </div>
        `;

        tracksContainer.appendChild(block);
      }
    }

    loadOrder();
  </script>

  <!-- Lightning background script (unchanged) -->
  <script>
    /* your lightning code stays exactly the same */
  </script>

</body>
</html>
