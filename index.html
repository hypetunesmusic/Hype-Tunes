<!doctype html><html lang="en"><head>
<title>Hype Tunes — Your Moment. Your Song.</title>
<meta name="description" content="Custom songs for birthdays, weddings, gyms, and brands. Your moment. Your song.">
<link rel="alternate" href="index.html" hreflang="en">
<link rel="alternate" href="index-es.html" hreflang="es">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="images/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png" sizes="180x180">
<meta name="theme-color" content="#3dd8ff">
<style>
*{box-sizing:border-box}
html,body{margin:0;background:#000;color:#fff;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto}
#energy{position:fixed;inset:0;z-index:0;filter:brightness(1.05) contrast(1.05)}
.overlay{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse at center,rgba(0,0,0,.2) 0%,rgba(0,0,0,.7) 60%,rgba(0,0,0,.9) 100%)}
.container{position:relative;z-index:2;width:min(1100px,96vw);margin:auto}
.hero-center{min-height:100vh;display:flex;flex-direction:column;justify-content:center;gap:22px;text-align:center}
.video-wrap{position:relative;width:min(900px,95%);margin:auto;border:1px solid rgba(61,216,255,.25);border-radius:16px;overflow:hidden;box-shadow:0 0 28px rgba(61,216,255,.18)}
video{display:block;width:100%;height:auto;background:#000}
.unmute{position:absolute;inset:auto 12px 12px auto;background:rgba(0,0,0,.6);border:1px solid rgba(61,216,255,.5);color:#3dd8ff;padding:10px 14px;border-radius:999px;font-weight:800;letter-spacing:.3px;cursor:pointer;user-select:none;text-shadow:0 0 8px rgba(61,216,255,.6);box-shadow:0 0 16px rgba(61,216,255,.25)}
.lang{position:fixed;top:12px;right:12px;z-index:3}
.lang a{display:inline-block;padding:8px 12px;border-radius:999px;border:1px solid rgba(61,216,255,.5);color:#3dd8ff;text-decoration:none;font-weight:700}
.lang a:hover{color:#ff4dd8;border-color:#ff4dd8;box-shadow:0 0 16px rgba(255,77,216,.45)}
.links-row{margin-top:18px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.chip{border:1px solid rgba(61,216,255,.5);color:#3dd8ff;padding:8px 16px;border-radius:999px;font-weight:600;box-shadow:0 0 10px rgba(61,216,255,.3);text-decoration:none}
.btn.pill{border:1px solid rgba(61,216,255,.5);color:#3dd8ff;padding:10px 18px;border-radius:999px;font-weight:800;text-decoration:none}
fieldset{border:1px solid #333;border-radius:12px;padding:12px;margin:12px 0}
legend{opacity:.9}
.hint{color:#7de8ff}
.price{font-weight:800;margin:6px 0 8px}
.row{display:grid;gap:12px}
.row.two{grid-template-columns:1fr}
@media(min-width:760px){.row.two{grid-template-columns:1fr 1fr}}
</style>
</head><body>
<canvas id="energy"></canvas><div class="overlay"></div>
<div class="lang"><a href="index-es.html">Español</a></div>
<main class="container hero-center">
  <div class="video-wrap">
    <video id="heroVideo" playsinline autoplay muted preload="auto" controlslist="nodownload nofullscreen noremoteplayback" disablepictureinpicture>
      <source src="videos/logo-video.mp4" type="video/mp4">
    </video>
    <button id="soundBtn" class="unmute" type="button">Tap to unmute</button>
  </div>
  <div class="links-row">
    <a class="btn pill" href="business-order.html">Quote for Businesses</a>
    <a class="btn pill" href="event-order.html">Quote for Events</a>
  </div>
  <div class="links-row">
    <a class="chip" href="https://open.spotify.com/artist/0pwbsdOg1y5AjU3fVvLQCz?si=dn-Y-EP5TEKs2at31db_Pg" target="_blank" rel="noopener">Spotify</a>
    <a class="chip" href="https://www.instagram.com/hype_tunes7" target="_blank" rel="noopener">Instagram</a>
    <a class="chip" href="https://www.tiktok.com/@hype.tunes?_t=ZT-90RumKihpDq&_r=1" target="_blank" rel="noopener">TikTok</a>

  </div>

<!-- NFC-only Save Contact (hidden by default) -->
<section id="nfc-only" style="display:none; text-align:center; margin:24px 0;">
  <a href="/contact.vcf" download class="btn pill" style="display:inline-block;">💾 Save Contact</a>
</section>

</main>
<script>
const v=document.getElementById('heroVideo'), btn=document.getElementById('soundBtn'); v.loop=false;
function setBtn(){btn.textContent = v.muted ? 'Tap to unmute' : 'Mute';}
btn.addEventListener('click',()=>{v.muted=!v.muted;if(!v.muted) v.play().catch(()=>{}); setBtn();});
v.addEventListener('click',()=>{if(v.muted){v.muted=false; v.play().catch(()=>{}); setBtn();}});
setBtn();
</script>

<script>
const c=document.getElementById('energy'),ctx=c.getContext('2d');let W,H,DPR=1;
function size(){DPR=Math.min(devicePixelRatio||1,2);W=c.width=Math.floor(innerWidth*DPR);H=c.height=Math.floor(innerHeight*DPR);c.style.width=innerWidth+'px';c.style.height=innerHeight+'px';}
addEventListener('resize',size);size();
const R=(a,b)=>Math.random()*(b-a)+a;
class Bolt{constructor(x0,y0,x1,y1,col,t){this.p=[{x:x0,y:y0}];const dx=x1-x0,dy=y1-y0,d=Math.hypot(dx,dy),n=Math.max(10,Math.min(60,Math.floor(d/20)));for(let i=1;i<n;i++){const s=i/n;let x=x0+dx*s,y=y0+dy*s;const j=(Math.sin(i*12.9898)*43758.5453)%1,o=(j-.5)*(d*.02),nx=-dy/d,ny=dx/d;x+=nx*o;y+=ny*o;this.p.push({x,y});}this.p.push({x:x1,y:y1});this.life=1;this.fade=R(.02,.045);this.c=col;this.t=t;this.g=[{w:t*5,a:.12},{w:t*2.5,a:.18},{w:t,a:.9}];}
draw(){for(const g of this.g){ctx.strokeStyle=this.c;ctx.globalAlpha=g.a*this.life;ctx.lineWidth=g.w*DPR;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(this.p[0].x,this.p[0].y);for(let i=1;i<this.p.length;i++)ctx.lineTo(this.p[i].x,this.p[i].y);ctx.stroke();}ctx.globalAlpha=1;}
step(){this.life-=this.fade;return this.life>0;}}
let bolts=[];
function spawn(){const e=Math.floor(R(0,4));let x0,y0;if(e===0){x0=R(0,W);y0=-50*DPR;} else if(e===1){x0=W+50*DPR;y0=R(0,H);} else if(e===2){x0=R(0,W);y0=H+50*DPR;} else {x0=-50*DPR;y0=R(0,H);}const x1=R(W*.25,W*.75),y1=R(H*.25,H*.75),col=Math.random()<.5?'rgba(61,216,255,1)':'rgba(255,77,216,1)',thick=R(1.5,3.2);const main=new Bolt(x0,y0,x1,y1,col,thick);bolts.push(main);if(Math.random()<.6){const n=Math.floor(R(1,3));for(let i=0;i<n;i++){const p=main.p[Math.floor(R(2,main.p.length-2))];const bx=p.x+R(-120*DPR,120*DPR),by=p.y+R(-120*DPR,120*DPR);bolts.push(new Bolt(p.x,p.y,bx,by,col,thick*.7));}}}
(function loop(){ctx.clearRect(0,0,W,H);bolts=bolts.filter(b=>{b.draw();return b.step();});if(Math.random()<.06)spawn();requestAnimationFrame(loop)})();
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const show = new URLSearchParams(location.search).get("from") === "nfc";
  const sec = document.getElementById("nfc-only");
  if (sec) sec.style.display = show ? "block" : "none";
});
</script>
