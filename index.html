<!doctype html>
<html lang="en">
<head>
<title>Hype Tunes — Your Moment. Your Song.</title>
<meta name="description" content="Custom songs for birthdays, weddings, gyms, and brands. Your moment. Your song.">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" type="image/png" href="images/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png" sizes="180x180">
<meta name="theme-color" content="#3dd8ff">

<style>
/* ------------------------------
   GLOBAL RESET + BASE
--------------------------------*/
* { box-sizing: border-box; }
html, body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto;
  line-height: 1.55;
}

/* ------------------------------
   BACKGROUND LIGHTNING
--------------------------------*/
#energy {
  position: fixed;
  inset: 0;
  z-index: 0;
  filter: brightness(1.05) contrast(1.05);
}
.overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  background: radial-gradient(ellipse at center,
    rgba(0,0,0,.15) 0%,
    rgba(0,0,0,.65) 55%,
    rgba(0,0,0,.9) 100%);
}

/* ------------------------------
   LAYOUT
--------------------------------*/
.container {
  position: relative;
  z-index: 2;
  width: min(1100px, 94vw);
  margin: auto;
  padding: 48px 0;
}

.hero-center {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 32px;
  text-align: center;
}

/* ------------------------------
   TYPOGRAPHY
--------------------------------*/
h1 {
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 900;
  letter-spacing: -0.5px;
  margin: 0;
  text-shadow: 0 0 18px rgba(61,216,255,.45);
}

p.sub {
  font-size: 1.15rem;
  opacity: .85;
  margin: 0 auto;
  max-width: 600px;
}

/* ------------------------------
   VIDEO WRAPPER
--------------------------------*/
.video-wrap {
  position: relative;
  width: min(900px, 95%);
  margin: auto;
  border: 1px solid rgba(61,216,255,.25);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 0 32px rgba(61,216,255,.22);
}
video {
  display: block;
  width: 100%;
  height: auto;
  background: #000;
}
.unmute {
  position: absolute;
  bottom: 14px;
  right: 14px;
  background: rgba(0,0,0,.55);
  border: 1px solid rgba(61,216,255,.5);
  color: #3dd8ff;
  padding: 10px 16px;
  border-radius: 999px;
  font-weight: 800;
  cursor: pointer;
  text-shadow: 0 0 8px rgba(61,216,255,.6);
  box-shadow: 0 0 16px rgba(61,216,255,.25);
}

/* ------------------------------
   BUTTONS + CHIPS
--------------------------------*/
.links-row {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn, .chip {
  display: inline-block;
  padding: 12px 22px;
  border-radius: 999px;
  font-weight: 700;
  text-decoration: none;
  transition: .2s ease;
  border: 1px solid rgba(61,216,255,.5);
  color: #3dd8ff;
  box-shadow: 0 0 14px rgba(61,216,255,.3);
}

.btn:hover, .chip:hover {
  color: #ff4dd8;
  border-color: #ff4dd8;
  box-shadow: 0 0 18px rgba(255,77,216,.45);
}

/* ------------------------------
   LANGUAGE SWITCH
--------------------------------*/
.lang {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 3;
}
.lang a {
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid rgba(61,216,255,.5);
  color: #3dd8ff;
  text-decoration: none;
  font-weight: 700;
}

/* ------------------------------
   FOOTER
--------------------------------*/
footer {
  margin-top: 48px;
  padding: 32px 0;
  text-align: center;
  opacity: .7;
