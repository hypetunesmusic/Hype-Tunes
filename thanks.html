<!doctype html>
<html lang="en">
<head>
<title>Thanks! | Hype Tunes</title>
<meta name="description" content="Thanks! We received your request and will follow up with next steps.">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" type="image/png" href="images/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png" sizes="180x180">
<meta name="theme-color" content="#3dd8ff">

<style>
/* GLOBAL */
*{box-sizing:border-box}
html,body{
  margin:0;background:#000;color:#fff;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto;
  line-height:1.55;
}

/* BACKGROUND */
#energy{position:fixed;inset:0;z-index:0;filter:brightness(1.05) contrast(1.05)}
.overlay{
  position:fixed;inset:0;z-index:1;
  background:radial-gradient(ellipse at center,
    rgba(0,0,0,.15) 0%,
    rgba(0,0,0,.65) 55%,
    rgba(0,0,0,.9) 100%)
}

/* LAYOUT */
.container{
  position:relative;z-index:2;
  width:min(1100px,94vw);
  margin:auto;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:48px 0;
}

/* CARD */
.card{
  width:min(720px,96vw);
  padding:32px 28px;
  text-align:center;
  border:1px solid rgba(61,216,255,.25);
  border-radius:18px;
  background:rgba(10,10,10,.7);
  backdrop-filter:blur(6px);
  box-shadow:0 0 40px rgba(61,216,255,.18);
}
h1{
  font-size:clamp(2rem,4vw,2.6rem);
  font-weight:900;margin:0 0 12px;
  text-shadow:0 0 18px rgba(61,216,255,.45)
}
p{
  opacity:.9;
  margin:0 0 24px;
  font-size:1.1rem;
}

/* LANGUAGE */
.lang{
  position:fixed;top:16px;right:16px;z-index:3
}
.lang a{
  padding:8px 14px;border-radius:999px;
  border:1px solid rgba(61,216,255,.5);
  color:#3dd8ff;text-decoration:none;font-weight:700;
}
.lang a:hover{
  color:#ff4dd8;border-color:#ff4dd8;
  box-shadow:0 0 16px rgba(255,77,216,.45)
}

/* BUTTONS */
.links-row{
  display:flex;gap:16px;flex-wrap:wrap;
  justify-content:center;
  margin-top:16px;
}
.btn{
  display:inline-block;padding:12px 22px;
  border-radius:999px;font-weight:800;
  text-decoration:none;cursor:pointer;
  border:1px solid rgba(61,216,255,.5);
  color:#3dd8ff;background:transparent;
  box-shadow:0 0 14px rgba(61,216,255,.3);
  transition:.2s ease;
}
.btn:hover{
  color:#ff4dd8;border-color:#ff4dd8;
  box-shadow:0 0 18px rgba(255,77,216,.45)
}

/* FOOTER */
footer{
  margin-top:48px;padding:32px 0;text-align:center;
  opacity:.7;font-size:.9rem
}
footer a{color:#3dd8ff;text-decoration:none}
footer a:hover{color:#ff4dd8}
</style>
</head>

<body>
<canvas id="energy"></canvas>
<div class="overlay"></div>

<div class="lang"><a href="thanks-es.html">Español</a></div>

<div class="container">
  <div class="card">
    <h1>Request Received ⚡</h1>
    <p>Thanks for reaching out! We’ll review your brief and email you with the next steps.</p>

    <div class="links-row">
      <a class="btn" href="index.html">← Back to Hype Tunes</a>
      <a class="btn" href="business-order.html">Order for Businesses</a>
      <a class="btn" href="event-order.html">Order for Events</a>
    </div>
  </div>
</div>

<footer>
  © 2026 Hype Tunes — Custom Music for Every Moment<br>
  <a href="mailto:7hypetunes@gmail.com">7hypetunes@gmail.com</a>
</footer>

<script>
/* Lightning Background */
const c=document.getElementById('energy'),ctx=c.getContext('2d');let W,H,DPR=1;
function size(){DPR=Math.min(devicePixelRatio||1,2);W=c.width=Math.floor(innerWidth*DPR);H=c.height=Math.floor(innerHeight*DPR);c.style.width=innerWidth+'px';c.style.height=innerHeight+'px'}
addEventListener('resize',size);size();
const R=(a,b)=>Math.random()*(b-a)+a;
class Bolt{constructor(x0,y0,x1,y1,col,t){this.p=[{x:x0,y:y0}];const dx=x1-x0,dy=y1-y0,d=Math.hypot(dx,dy),n=Math.max(10,Math.min(60,Math.floor(d/20)));for(let i=1;i<n;i++){const s=i/n;let x=x0+dx*s,y=y0+dy*s;const j=(Math.sin(i*12.9898)*43758.5453)%1,o=(j-.5)*(d*.02),nx=-dy/d,ny=dx/d;x+=nx*o;y+=ny*o;this.p.push({x,y})}this.p.push({x:x1,y:y1});this.life=1;this.fade=R(.02,.045);this.c=col;this.t=t;this.g=[{w:t*5,a:.12},{w:t*2.5,a:.18},{w:t,a:.9}]}
draw(){for(const g of this.g){ctx.strokeStyle=this.c;ctx.globalAlpha=g.a*this.life;ctx.lineWidth=g.w*DPR;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(this.p[0].x,this.p[0].y);for(let i=1;i<this.p.length;i++)ctx.lineTo(this.p[i].x,this.p[i].y);ctx.stroke()}ctx.globalAlpha=1}
step(){this.life-=this.fade;return this.life>0}}
let bolts=[];
function spawn(){const e=Math.floor(R(0,4));let x0,y0;if(e===0){x0=R(0,W);y0=-50*DPR}else if(e===1){x0=W+50*DPR;y0=R(0,H)}else if(e===2){x0=R(0,W);y0=H+50*DPR}else{x0=-50*DPR;y0=R(0,H)}const x1=R(W*.25,W*.75),y1=R(H*.25,H*.75),col=Math.random()<.5?'rgba(61,216,255,1)':'rgba(255,77,216,1)',thick=R(1.5,3.2);const main=new Bolt(x0,y0,x1,y1,col,thick);bolts.push(main);if(Math.random()<.6){const n=Math.floor(R(1,3));for(let i=0;i<n;i++){const p=main.p[Math.floor(R(2,main.p.length-2))];const bx=p.x+R(-120*DPR,120*DPR),by=p.y+R(-120*DPR,120*DPR);bolts.push(new Bolt(p.x,p.y,bx,by,col,thick*.7))}}}
(function loop(){ctx.clearRect(0,0,W,H);bolts=bolts.filter(b=>{b.draw();return b.step()});if(Math.random()<.06)spawn();requestAnimationFrame(loop)})();
</script>

</body>
</html>
